<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAAD Scholars | Bayerisches Geoinstitut</title>

  <style>

    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    header {
      background: white;
      border-bottom: 1px solid #e5e5e5;
      padding: 20px 30px;
    }

    .header-container {
      max-width: 1000px;
      margin: auto;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      height: 60px;
    }

    .title h1 {
      margin: 0;
      font-size: 26px;
    }

    .title p {
      margin: 4px 0 0 0;
      color: #666;
      font-size: 14px;
    }

    main {
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 25px;
      text-align: center;
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #ddd;
      margin: 0 auto 15px auto;
    }

    .name {
      font-weight: bold;
      font-size: 18px;
    }

    .role {
      color: #777;
      font-size: 14px;
      margin-top: 5px;
    }

    footer {
      text-align: center;
      margin: 60px 0 30px 0;
      font-size: 13px;
      color: #777;
    }

  </style>

</head>

<body>

<header>

  <div class="header-container">

    <img src="images/daad_logo.svg" alt="DAAD Logo" class="logo">

    <div class="title">
      <h1>DAAD Scholars</h1>
      <p>Bayerisches Geoinstitut · University of Bayreuth</p>
    </div>

  </div>

</header>

<main>

  <section class="grid">

    <div class="card">
      <div class="avatar"></div>
      <div class="name">Aritro Chattopadhyay</div>
      <div class="role">DAAD Scholar</div>
    </div>

    <div class="card">
      <div class="avatar"></div>
      <div class="name">Sanket Samal</div>
      <div class="role">DAAD Scholar</div>
    </div>

    <div class="card">
      <div class="avatar"></div>
      <div class="name">Soumilee Sardar</div>
      <div class="role">DAAD Scholar</div>
    </div>

    <div class="card">
      <div class="avatar"></div>
      <div class="name">John Doe</div>
      <div class="role">DAAD Scholar</div>
    </div>

  </section>

</main>

<footer>
  © 2026 Bayerisches Geoinstitut · DAAD Scholars
</footer>

</body>
</html>
